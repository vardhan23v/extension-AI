name: Deploy Backend to Azure App Service

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/azure-backend.yml'

env:
  REGISTRY_NAME: extensioairegistry
  REPOSITORY: extensio-ai-backend
  DOCKER_PATH: backend
  APP_SERVICE_NAME: extensio-ai-backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ env.REGISTRY_NAME }}.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t ${{ env.REGISTRY_NAME }}.azurecr.io/${{ env.REPOSITORY }}:${{ github.sha }} ./${{ env.DOCKER_PATH }}

      - name: Push image to Azure Container Registry
        run: |
          docker push ${{ env.REGISTRY_NAME }}.azurecr.io/${{ env.REPOSITORY }}:${{ github.sha }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.APP_SERVICE_NAME }}
          images: ${{ env.REGISTRY_NAME }}.azurecr.io/${{ env.REPOSITORY }}:${{ github.sha }}

      - name: Logout from Azure
        run: az logout
